<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        변수 선언 - 데이터 타입 선언 X, var, let, const
        1. var
        - ES6 이전부터 사용한 선언자
        - 재선언(동일한 이름으로 재선언이 가능), 재할당 모두 가능
        - 재선언이 가능한 변수 => 협업을 하면서 동일한 이름의 변수를 var로 선언할 경우 덮어쓰기가 가능해서 예상하지 않은 결과가 나올 수 있다.
        - 전역변수에 사용 => 권장 X (덮어쓰기)
        */
       var studentName = "2학년 1반";
       console.log(studentName);
       var studentName = "2학년 3반"; // 재선언 가능
       console.log(studentName);
       studentName = "2학년 2반"; // 재할당 가능
       console.log(studentName);

       var x = 8;
       var y = 9;
       var z = x + y;
       console.log("Z : ", z);

       var x = 10; // 재선언
       var y = 11; // 재할당
       z = x - y;
       console.log("Z : ", z)

       /*
        2. let
        - ESG 이후부터 사용한 선언자
        - 재선언 불가능, 재할당 가능 => 권장
        - 동일한 변수명을 다른 곳에서 사용 불가
        */
       //let x = 5; 실행과정 중 발생
       //Uncaught SyntaxError : Identifier 'x' has already been declared
       //console.log(x);

       let x1 = 10;
       let y1 = 11;
       let z1 = x1+y1;
       console.log("z1 : ", z1);

       //let x1 = 9; 재선언 불가 => 코딩 중에 Syntax Error
       x1 = 26;
       z1 = x1 + y1;
       console.log("z1 : ", z1);

       /*
       3.const
       - ESG 이후부터 사용한 선언자
       - 변하지 않는 상수값 => 대문자 사용
       - 재선언, 재할당 불가
       - 현업 => 
       */ 
      const PI = 3.14;
      // PI = 3;
      console.log(PI)
      const korea_dateFormat = "YYYY-MM-DD";
      const usa_dateFormat = "DD-MM-YYYY";

    </script>
</body>
</html>
