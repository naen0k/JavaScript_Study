<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let brands = [
        "애플",
        "구글",
        "마이크로소프트",
        "삼성",
        "아마존",
        "테슬라",
      ];
      // for ~ in : 객체에서 많이 사용, 배열에서 사용할 경우
      // => 초기화, 조건, 증가식이 없어도 전체 순회
      // 1. 배열에서 사용
      for (const i in brands) {
        // i는 인덱스
        console.log(i);
        console.log(brands[i]);
      }

      // 2. 객체에서 사용
      let person = {
        name: "홍길동",
        age: 22,
        tel: "010-0000-1111",
        city: "Seoul",
      };
      //   for (const key in person) {
      //     console.log(key, " : ", person[key]);
      //   }
      // 알고 싶은 키를 입력받고, 키에 대한 값을 출력하는 코드(빈 칸, 없는 키 체크)
      let inform = prompt("알고 싶은 키를 입력하세요 (name, age, tel, city)");
      if(!inform) {
        console.log("입력값이 존재하지 않습니다");
      } 
      else {
        let find = false;

        for(const key in person) {
          if(key === inform) {
            console.log(key, " : ", person[key]);
            find = true;
          }
        }
        if(find === false) {
          console.log(inform, " 키가 존재하지 않습니다.");
        }
      }
    </script>
  </body>
</html>
