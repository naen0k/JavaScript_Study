<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // String 내장 함수
      // 1. 속성(property) : length

      let str = "Welcome Seoul";
      console.log(str.length); // 0 ~ 12
      // 2. indexOf(대상, 시작위치) : 찾고자 하는 문자열의 시작 인덱스 리턴(여러개라면 첫 번째만)
      //찾고자 하는 대상이 없으면 리턴은 -1
      console.log(str.indexOf("Seoul"));
      str = "Welcome Seoul Seoul";
      console.log(str.indexOf("Seoul", 9));
      console.log(str.indexOf("Jeju")); // -1

      //활용 : 전화번호 입력 시 '-' 없이 입력 => '-'가 있다면 에러 메세지 출력
      let tel = "010-0000-0000";
      if (tel.indexOf("-") !== -1) {
        console.log("숫자만 입력해주세요");
      } else {
        console.log("입력이 완료되었습니다");
      }

      // 3. lastIndexOf() : 뒤에서부터 문자열을 찾아서 리턴(여러개라면 첫 문자열)
      console.log(str.lastIndexOf("Seoul"));

      // *** 4. slice() : 문자열을 (시작위치, 마지막위치-1)만 리턴
      str = "Welcome Seoul";
      console.log(str.slice(8, 13));
      console.log(str.slice(8));
      //Seoul의 위치를 모르는 경우
      console.log(str.slice(str.indexOf("Seoul")));
      console.log(str.slice(-5)); //Seoul
      console.log(str.slice(-5, -2)); //Seo (-5, -4, -3)

      // 5. substring() : 문자열을 (시작위치, 마지막위치-1)만 리턴
      // '-' 지원 안한다 => 0
      str = "Welcome Seoul";
      console.log(str.substring(8, 13));
      console.log(str.substring(8));
      //console.log(str.substring(-5)); //str.substring(0)
      //console.log(str.substring(-5, -2)); //지원을 아예 안함

      // 6. substr() : 문자열을 (시작위치, 길이)만 리턴
      // 길이를 명확히 아는 경우 매우 효율적
      let nowDate = "20260420";
      let year = nowDate.substr(0, 4);
      let month = nowDate.substr(4, 2);
      let date = nowDate.substr(6, 2);
      console.log(year, month, date);

      /* slice  vs  substring  vs  substr
      - slice : 가장 유연하고 현대적인 메서드, 음수처리가 가능
      - substring : slice와 유사하지만 인덱스가 음인 경우 처리가 다르다
      - substr : 인덱스가 아닌 글자 수를 기준으로 하지만 현제 웹표준으로 권장하지 않는다 */

      // 7. replace(str1, str2) : str1을 str2로 교체하는 함수
      str = "Welcome Jeju! Jeju";
      console.log(str.replace("Jeju", "Seoul"));

      // ** 8. toUpperCase() : 대문자로 변환
      str = "Welcome Jeju! Jeju";
      console.log(str.toUpperCase());
      // ** 9. toLowerCase() : 소문자로 변환
      console.log(str.toLowerCase());
      // 사용자는 다양하게 입력하게 되므로.... (프론트엔드)입력된 내용을 대(소)문자로 변환하면 된다

      // 10. concat() : 여러 문자열을 합치기, 합칠 문자열의 갯수에는 제한이 없다
      let firstName = "John";
      let lastName = "Doe";
      let fullName = firstName.concat(" ", lastName, ". ", "Nice to meet you");
      console.log(fullName);

      // 11. trim() : 문자열의 앞, 뒤 공백을 없애기
      // const middleTrim = () => {}
      let name = "          에이스  2학년 1반 ";
      console.log(name.trim());

      // ***** 12. padStart(문자열 전체 길이, 앞에 채울 문자열) : 현업에서 가장 많이 사용하는 함수 중 하나
      // 특정 문자로 앞을 채운다
      // 월을 입력받아, 월이 한자리인 경우 "0"을 붙여서 출력
      month = prompt("월을 입력하세요");
      console.log(month.padStart(2, "0") + "월");
      // if (month > 0 && month < 13) {
      //   if (month > 0 && month < 10) {
      //     console.log(0 + month + "월");
      //   } else {
      //     console.log(month + "월");
      //   }
      // } else {
      //   console.log("1~12월 사이로 다시 입력해 주세요");
      // }

      // 13. padEnd(문자열 전체 길이, 뒤에 채울 문자열) : 거의 사용하지 않음
    </script>
  </body>
</html>
