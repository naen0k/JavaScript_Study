<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script src="../JS/common.js"></script>
    <script>
      /* 1. 함수 선언 방식
              function 함수이름(매개변수....) {
                  :
                  :
                  (return)
              }
                  - 선언전 호출이 가능하다
                  - 브라우져 엔진이 메모리 로딩하는 순서
                      1. 선언함수 2. 전역변수 (var) 나머지는 코드 순서대로
                  -
              */
      console.log(sum(4, 8)); // 선언 전 호출
      function sum(n1, n2) {
        // 선언
        return n1 + n2;
      }
      console.log(sum(4, 8));
      function taxAmount(productPrice) {
        let tax = 0.5;
        return productPrice * tax;
      }
      console.log(taxAmount(13400));
      console.log(getTop5());

      // 2. 함수 표현식 : 변수에 함수를 할당, 변수명이 함수처럼 사용, 선언전에 사용이 불가능
      const sum2 = function (n1, n2) {
        return n1 + n2;
      };
      console.log(sum2(5, 6));

      /* 3. 화살표 함수
            - 실무에서 가장 많이 사용
            - 변수에 함수를 할당, 변수명이 함수명처럼 사용
            - function 사용 안함, (매개변수) => {}
            - return 문이 있고 한 줄로 되어있다면 return 과 {} 생략 가능
            */
      const sum3 = (n1, n2) => n1 + n2;
      console.log(sum3(5, 6));

      const test = (productPrice) => {
        let tax = 0.1;
        return productPrice * tax;
      };

      const getTop = () => {
        return ["이재용", 2, 3, 4, "장하은"];
      };

      // 4. Function() : 생성자 함수, 무조건 문자열만
      // new Function("", "", ""........) => 마지막 문자열이 코드
      // 숫자 2개, 연산자를 입력 받아 그에 맞는 연산을 실행하는 함수(calculator)를 작성해보자.

      const calculator2 = new Function("n1", "n2", "return n1 + n2");
      console.log("calculator : ", calculator2(3, 4));

      let n1 = 9;
      let n2 = 63;
      let op = "+"; // + - * / %

      const calculator = function (n1, n2, op) {
        if (op === "+") return n1 + n2;
        else if (op === "-") return n1 - n2;
        else if (op === "*") return n1 * n2;
        else if (op === "/") return n1 / n2;
        else if (op === "%") return n1 % n2;
        else console.log("연산자가 아닙니다.");
      };
      console.log(calculator(n1, n2, op));

      op = "*";
      const calculator3 = new Function ("n1", "n2", "op", "return n1" + op + "n2");
      console.log("calculator3 : ", calculator3(n1, n2, op));
    </script>
  </body>
</html>
